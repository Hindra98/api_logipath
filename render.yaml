services:
  - type: web
    name: logipath-backend
    env: docker
    plan: free
    region: frankfurt # Plus proche du Cameroun que l'US
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: logipath-db
          property: connectionString

databases:
  - name: logipath-db
    plan: free
    region: frankfurt